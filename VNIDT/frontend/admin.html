<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNiDT Admin — Quản Trị Nội Dung</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-app: #F8FAFC;
      --bg-sidebar: #FFFFFF;
      --bg-card: #FFFFFF;
      --bg-input: #F1F5F9;
      --bg-input-focus: #FFFFFF;
      --border: #E2E8F0;
      --border-focus: #0F52BA;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --accent: #0F52BA;
      --accent-glow: rgba(15, 82, 186, 0.1);
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --radius: 12px;
      --radius-sm: 8px;
      --topbar-h: 64px;
      --sidebar-w: 272px;
      --transition: 0.2s ease;
    }

    body {
      font-family: 'Be Vietnam Pro', system-ui, sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    .topbar__brand {
      display: flex; align-items: center; gap: 12px;
      font-size: 18px; font-weight: 700; color: var(--text-primary);
      text-decoration: none;
    }
    .topbar__brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #0D9488);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 16px;
    }
    .topbar__badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
      background: var(--accent-glow); color: var(--accent);
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .topbar__actions { display: flex; gap: 10px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all var(--transition);
      text-decoration: none; white-space: nowrap;
    }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn--primary {
      background: linear-gradient(135deg, var(--accent), #0EA5E9);
      color: white; box-shadow: 0 2px 12px rgba(15,82,186,0.3);
    }
    .btn--primary:hover { box-shadow: 0 4px 20px rgba(15,82,186,0.5); transform: translateY(-1px); }
    .btn--secondary {
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn--secondary:hover { background: var(--bg-input-focus); border-color: rgba(255,255,240,0.12); }
    .btn--success { background: var(--success); color: white; }
    .btn--danger { background: transparent; color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .btn--danger:hover { background: rgba(239,68,68,0.1); }
    .btn--ghost { background: transparent; color: var(--text-secondary); padding: 8px 12px; }
    .btn--ghost:hover { color: var(--text-primary); background: var(--bg-input); }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 12px;
      z-index: 50;
    }
    .sidebar__label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-muted);
      padding: 16px 12px 8px; margin-top: 4px;
    }
    .sidebar__item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--transition);
      color: var(--text-secondary); font-size: 13.5px; font-weight: 500;
      border: 1px solid transparent; margin-bottom: 2px;
    }
    .sidebar__item:hover { background: var(--bg-input); color: var(--text-primary); }
    .sidebar__item.active {
      background: var(--accent-glow); color: var(--accent);
      border-color: rgba(15, 82, 186, 0.2);
    }
    .sidebar__item-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--bg-input); display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: var(--text-muted);
      flex-shrink: 0; transition: all var(--transition);
    }
    .sidebar__item.active .sidebar__item-icon {
      background: var(--accent); color: white;
    }
    .sidebar__count {
      margin-left: auto; font-size: 11px; color: var(--text-muted);
      background: var(--bg-card); padding: 2px 8px; border-radius: 12px;
    }

    /* ── Main Content ── */
    .main {
      position: fixed; top: var(--topbar-h); left: var(--sidebar-w); right: 0; bottom: 0;
      overflow-y: auto; padding: 32px 40px 80px;
      background: var(--bg-app);
    }

    /* ── Section Panel ── */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .panel__header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 32px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel__icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #0D9488);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: white;
    }
    .panel__title { font-size: 22px; font-weight: 700; }
    .panel__desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* ── Form Fields ── */
    .field { margin-bottom: 24px; }
    .field__label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .field__badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
    }
    .field__badge--html { background: rgba(15,82,186,0.15); color: var(--accent); }
    .field__badge--text { background: rgba(16,185,129,0.15); color: var(--success); }

    .field__input,
    .field__textarea {
      width: 100%; padding: 12px 16px;
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: inherit; font-size: 14px; line-height: 1.6;
      transition: all var(--transition); outline: none;
    }
    .field__input:focus,
    .field__textarea:focus {
      border-color: var(--border-focus);
      background: var(--bg-input-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .field__textarea { min-height: 100px; resize: vertical; }
    .field__textarea--html { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
    .field__hint {
      font-size: 11px; color: var(--text-muted); margin-top: 6px;
    }

    /* ── Field Group (side by side) ── */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .field-row--3 { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 1100px) {
      .field-row, .field-row--3 { grid-template-columns: 1fr; }
    }

    /* ── Section Divider ── */
    .divider {
      margin: 32px 0; padding: 12px 0;
      border-top: 1px solid var(--border);
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--accent);
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; right: 32px;
      padding: 14px 24px; border-radius: var(--radius);
      font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
      transform: translateY(120px); opacity: 0;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      z-index: 999; backdrop-filter: blur(12px);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast--success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .toast--error { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .toast--info { background: rgba(15,82,186,0.15); color: var(--accent); border: 1px solid rgba(15,82,186,0.3); }
    .toast svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; max-width: 480px; width: 90%;
      animation: fadeIn 0.2s ease;
    }
    .modal__title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .modal__text { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
    .modal__actions { display: flex; gap: 12px; justify-content: flex-end; }

    /* ── Unsaved indicator ── */
    .unsaved-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--warning); display: none;
      animation: pulse-dot 1.5s infinite;
    }
    .unsaved-dot.show { display: block; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.15); }

  </style>

  <!-- Hidden file input -->
  <style>
    .hidden-input { display: none; }
  </style>

  <!-- Auth Check -->
  <script>
    const token = localStorage.getItem('vnidt_cms_token');
    if (!token) {
      window.location.href = 'login.html';
    }
  </script>
</head>
<body>

  <!-- ── TOPBAR ── -->
  <header class="topbar">
    <div style="display:flex; align-items:center; gap:16px">
      <a href="index.html" class="topbar__brand">
        <img src="assets/Logo_transparent.png" alt="VNiDT Logo" style="height: 47px; width: auto; object-fit: contain;">
        Admin
      </a>
      <span class="topbar__badge">CMS</span>
      <div class="unsaved-dot" id="unsavedDot" title="Có thay đổi chưa lưu"></div>
    </div>
    <div class="topbar__actions">
      <button class="btn btn--ghost" id="btnImport" title="Nhập dữ liệu từ file JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Nhập
      </button>
      <button class="btn btn--secondary" id="btnExport" title="Xuất nội dung ra file JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Xuất JSON
      </button>
      <button class="btn btn--danger" id="btnReset" title="Khôi phục nội dung mặc định">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Đặt lại
      </button>
      <a href="index.html" target="_blank" class="btn btn--secondary" id="btnPreview" title="Xem trang web">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        Xem trước
      </a>
      <button class="btn btn--primary" id="btnSave" title="Lưu tất cả thay đổi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Lưu thay đổi
      </button>
      <div style="width: 1px; height: 32px; background: var(--border); margin: 0 4px;"></div>
      <button class="btn btn--ghost" id="btnChangePwd" title="Đổi mật khẩu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>
      <button class="btn btn--ghost" id="btnLogout" title="Đăng xuất" style="color: var(--error);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Đăng xuất
      </button>
    </div>
  </header>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- ── MAIN ── -->
  <main class="main" id="mainContent"></main>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    <span id="toastMsg"></span>
  </div>

  <!-- ── RESET MODAL ── -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <h3 class="modal__title">Xác nhận đặt lại</h3>
      <p class="modal__text">Bạn có chắc chắn muốn khôi phục toàn bộ nội dung về mặc định? Tất cả thay đổi đã lưu sẽ bị xóa và không thể phục hồi.</p>
      <div class="modal__actions">
        <button class="btn btn--secondary" id="resetCancel">Hủy</button>
        <button class="btn btn--danger" id="resetConfirm">Đặt lại mặc định</button>
      </div>
    </div>
  </div>

  <!-- ── CHANGE PASSWORD MODAL ── -->
  <div class="modal-overlay" id="pwdModal">
    <div class="modal">
      <h3 class="modal__title">Đổi mật khẩu</h3>
      <div class="field">
        <label class="field__label">Mật khẩu cũ</label>
        <input type="password" class="field__input" id="pwdOld">
      </div>
      <div class="field">
        <label class="field__label">Mật khẩu mới</label>
        <input type="password" class="field__input" id="pwdNew">
      </div>
      <div class="modal__actions">
        <button class="btn btn--secondary" id="pwdCancel">Hủy</button>
        <button class="btn btn--primary" id="pwdConfirm">Xác nhận</button>
      </div>
    </div>
  </div>

  <!-- ── USER MODAL ── -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <h3 class="modal__title" id="userModalTitle">Thêm Tài Khoản</h3>
      <input type="hidden" id="userModalId">
      <div class="field">
        <label class="field__label">Email</label>
        <input type="email" class="field__input" id="userModalEmail">
      </div>
      <div class="field">
        <label class="field__label">Mật khẩu <span id="userModalPasswordHint" class="field__hint" style="display:none">(Để trống nếu không muốn đổi)</span></label>
        <input type="password" class="field__input" id="userModalPassword">
      </div>
      <div class="field">
        <label class="field__label">Quyền hạn</label>
        <select class="field__input" id="userModalRole">
          <option value="super_admin">Super Admin (Toàn quyền)</option>
          <option value="admin">Admin (Quản lý)</option>
          <option value="editor">Editor (Biên tập viên)</option>
          <option value="dept_manager">Trưởng phòng</option>
          <option value="viewer">Viewer (Chỉ xem)</option>
        </select>
      </div>
      <div class="modal__actions">
        <button class="btn btn--secondary" id="userModalCancel">Hủy</button>
        <button class="btn btn--primary" id="userModalConfirm">Lưu</button>
      </div>
    </div>
  </div>

  <!-- ── PROJECT MODAL ── -->
  <div class="modal-overlay" id="projModal">
    <div class="modal">
      <h3 class="modal__title" id="projModalTitle">Thêm Dự Án</h3>
      <input type="hidden" id="projModalId">
      <div class="field">
        <label class="field__label">Tên dự án</label>
        <input type="text" class="field__input" id="projModalName" placeholder="Ví dụ: CSDL Tài Nguyên Môi Trường">
      </div>
      <div class="field">
        <label class="field__label">Nhãn phân loại (tag) - Tự nhập tay</label>
        <input type="text" class="field__input" id="projModalTag" placeholder="Ví dụ: CSDL · GIS">
      </div>
      <div class="field">
        <label class="field__label">Ảnh dự án</label>
        <input type="hidden" id="projModalImageUrl">
        <div style="display:flex; align-items:center; gap: 12px;">
          <label for="projModalFile" class="btn btn--secondary" style="cursor:pointer; display:inline-flex; align-items:center; gap:6px; padding: 8px 16px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Chọn ảnh
          </label>
          <input type="file" id="projModalFile" accept="image/*" style="display:none;">
          <span id="projModalFileName" style="font-size:12px; color:var(--text-muted);">Chưa chọn ảnh</span>
        </div>
        <div id="projModalPreview" style="margin-top: 10px; display:none;">
          <img id="projModalPreviewImg" style="max-width: 200px; max-height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border);">
        </div>
      </div>
      <div class="field">
        <label class="field__label">Mô tả dự án</label>
        <textarea class="field__textarea" id="projModalDesc" placeholder="Mô tả ngắn gọn về dự án..."></textarea>
      </div>
      <div class="modal__actions">
        <button class="btn btn--secondary" id="projModalCancel">Hủy</button>
        <button class="btn btn--primary" id="projModalConfirm">Lưu</button>
      </div>
    </div>
  </div>

  <!-- ── NEWS MODAL ── -->
  <div class="modal-overlay" id="newsModal">
    <div class="modal">
      <h3 class="modal__title" id="newsModalTitle">Thêm Tin Tức</h3>
      <input type="hidden" id="newsModalId">
      <div class="field">
        <label class="field__label">Tên tin tức</label>
        <input type="text" class="field__input" id="newsModalName" placeholder="Tiêu đề bài viết...">
      </div>
      <div class="field">
        <label class="field__label">Đường dẫn tĩnh (Slug)</label>
        <input type="text" class="field__input" id="newsModalSlug" placeholder="vndt-trien-khai-thanh-cong">
      </div>
      <div class="field">
        <label class="field__label">Trạng thái</label>
        <select class="field__input" id="newsModalStatus">
          <option value="draft">Bản nháp (Draft)</option>
          <option value="published">Đã xuất bản (Published)</option>
        </select>
      </div>
      <div class="field">
        <label class="field__label">Mô tả / Nội dung tóm tắt</label>
        <textarea class="field__textarea" id="newsModalDesc" placeholder="Mô tả chi tiết nội dung tin tức..."></textarea>
      </div>
      <div class="field">
        <label class="field__label">Thời gian đăng (publishedAt)</label>
        <input type="datetime-local" class="field__input" id="newsModalDate">
      </div>
      <div class="modal__actions">
        <button class="btn btn--secondary" id="newsModalCancel">Hủy</button>
        <button class="btn btn--primary" id="newsModalConfirm">Lưu</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" accept=".json" class="hidden-input" id="fileInput">

  <script src="config.js"></script>
  <script src="content.js"></script>
  <script>
  (async function () {
    'use strict';

    var CMS = window.VNiDTCMS;
    var currentSection = CMS.SECTIONS[0].id;
    var hasUnsaved = false;
    var content = await CMS.getContentAsync();

    // ── Build Sidebar ──
    var sidebar = document.getElementById('sidebar');
    var sidebarHTML = '<div class="sidebar__label sidebar__label-toggle" id="toggleStaticContent" style="display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none;">' +

      switchSection(sectionId);

    function switchSection(sectionId) {
      currentSection = sectionId;

      // Update sidebar
      sidebar.querySelectorAll('.sidebar__item').forEach(function (el) {
        el.classList.toggle('active', el.getAttribute('data-section') === sectionId);
      });

      // Update panels
      document.querySelectorAll('.panel').forEach(function (el) {
        el.classList.toggle('active', el.id === 'panel-' + sectionId);
      });

      // Scroll main to top
      document.getElementById('mainContent').scrollTop = 0;

      // Load dynamic data on switch
      if (sectionId === 'projects') {
        loadProjects();
      } else if (sectionId === 'news') {
        loadNews();
      } else if (sectionId === 'contacts') {
        loadContacts();
      }
    }

    // ── Track Changes ──
    mainContent.addEventListener('input', function (e) {
      var el = e.target;
      if (!el.dataset.key) return;
      content[el.dataset.key] = el.value;
      setUnsaved(true);
    });

    function setUnsaved(state) {
      hasUnsaved = state;
      document.getElementById('unsavedDot').classList.toggle('show', state);
    }

    // ── Save ──
    var btnSave = document.getElementById('btnSave');
    btnSave.addEventListener('click', async function () {
      btnSave.disabled = true;
      btnSave.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Đang lưu...';
      
      // Collect all values from form
      document.querySelectorAll('[data-key]').forEach(function (el) {
        content[el.dataset.key] = el.value;
      });

      try {
        var result = await CMS.saveContentAsync(content);
        if (result && result.success) {
          setUnsaved(false);
          showToast('Đã lưu thay đổi lên Server!', 'success');
        } else {
          showToast(result.message || 'Lỗi từ Server!', 'error');
        }
      } catch(e) {
        showToast('Lỗi khi lưu dữ liệu!', 'error');
      } finally {
        btnSave.disabled = false;
        btnSave.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Lưu thay đổi';
      }
    });

    // ── Export ──
    document.getElementById('btnExport').addEventListener('click', function () {
      var json = CMS.exportJSON();
      var blob = new Blob([json], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'vnidt-content-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Đã xuất file JSON thành công!', 'success');
    });

    var fileInput = document.getElementById('fileInput');
    document.getElementById('btnImport').addEventListener('click', function () {
      fileInput.click();

    fileInput.addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function (evt) {
        try {
          var imported = CMS.importJSON(evt.target.result);
          content = imported;
          // Refresh all form fields
          document.querySelectorAll('[data-key]').forEach(function (el) {
            var key = el.dataset.key;
            if (content[key] !== undefined) {
              el.value = content[key];
            }
          });
          setUnsaved(false);
          showToast('Đã nhập dữ liệu thành công!', 'success');
        } catch (err) {
          showToast('File JSON không hợp lệ!', 'error');
        }
      };
      reader.readAsText(file);
      fileInput.value = '';
    });

      resetModal.classList.remove('show');
    });
    document.getElementById('resetConfirm').addEventListener('click', function () {
      CMS.resetContent();
      content = CMS.getDefaults();

      // Refresh all form fields
      document.querySelectorAll('[data-key]').forEach(function (el) {
        var key = el.dataset.key;
        if (content[key] !== undefined) {
          el.value = content[key];
        }

    var toastEl = document.getElementById('toast');
    var toastMsg = document.getElementById('toastMsg');
    var toastTimer;

    function showToast(message, type) {
      clearTimeout(toastTimer);
      toastEl.className = 'toast toast--' + (type || 'success');
      toastMsg.textContent = message;

      // Update icon
      var icons = {
        success: '<path d="M20 6 9 17l-5-5"/>',
        error: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
        info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
      };
      toastEl.querySelector('svg').innerHTML = icons[type] || icons.success;

      requestAnimationFrame(function () {
        toastEl.classList.add('show');
      });

      toastTimer = setTimeout(function () {
        toastEl.classList.remove('show');
      }, 3000);
    }

    async function loadProjects() {
      var token = localStorage.getItem('vnidt_cms_token');
      var tbody = document.getElementById('projectsTableBody');
      if(!tbody) return;
      tbody.innerHTML = '<tr><td colspan="5" style="padding: 16px; text-align:center;">Đang tải...</td></tr>';
      try {
        var res = await fetch('/api/projects');
        var resData = await res.json();
        if (resData.success) {
          var html = '';
          resData.data.forEach(function(p) {
            var imgUrl = p.imageUrl || '';
            var resolvedImgUrl = window.getAssetUrl ? window.getAssetUrl(imgUrl) : imgUrl;
            var imgTag = imgUrl ? '<img src="' + resolvedImgUrl + '" style="width: 48px; height: 32px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border);">' : '<span style="font-size:11px; color:var(--text-muted)">Không có</span>';
            html += '<tr style="border-bottom: 1px solid var(--border);">' +
                    '<td style="padding: 12px 16px;">' + imgTag + '</td>' +
                    '<td style="padding: 12px 16px;"><span class="field__badge field__badge--text">' + p.tag + '</span></td>' +
                    '<td style="padding: 12px 16px; font-weight:600">' + p.name + '</td>' +
                    '<td style="padding: 12px 16px; color:var(--text-secondary)">' + p.description + '</td>' +
                    '<td style="padding: 12px 16px;">' +
                    '<button class="btn btn--ghost btnEditProject" data-id="'+p.id+'" data-tag="'+p.tag+'" data-name="'+p.name+'" data-desc="'+p.description+'" data-image="'+imgUrl+'" style="padding: 6px; color:var(--accent); margin-right: 8px;" title="Sửa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
                    '<button class="btn btn--ghost btnDeleteProject" data-id="'+p.id+'" style="padding: 6px; color:var(--error);" title="Xóa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>' +
                    '</td></tr>';
          });
          tbody.innerHTML = html || '<tr><td colspan="5" style="padding: 16px; text-align:center; color:var(--text-muted)">Chưa có dự án nào.</td></tr>';
          
          // Bind edit events
          document.querySelectorAll('.btnEditProject').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
              var id = this.getAttribute('data-id');
              var tag = this.getAttribute('data-tag');
              var name = this.getAttribute('data-name');
              var desc = this.getAttribute('data-desc');
              var image = this.getAttribute('data-image');
              
              document.getElementById('projModalTitle').innerText = 'Sửa Dự Án';
              document.getElementById('projModalId').value = id;
              document.getElementById('projModalTag').value = tag;
              document.getElementById('projModalName').value = name;
              document.getElementById('projModalDesc').value = desc;
              document.getElementById('projModalImageUrl').value = image;
              // Show existing image preview
              var fileInput = document.getElementById('projModalFile');
              if (fileInput) fileInput.value = '';
              var previewDiv = document.getElementById('projModalPreview');
              var previewImg = document.getElementById('projModalPreviewImg');
              var fileNameSpan = document.getElementById('projModalFileName');
              if (image) {
                previewImg.src = window.getAssetUrl ? window.getAssetUrl(image) : image;
                previewDiv.style.display = 'block';
                fileNameSpan.textContent = image.split('/').pop();
              } else {
                previewDiv.style.display = 'none';
                fileNameSpan.textContent = 'Chưa chọn ảnh';
              }
              document.getElementById('projModal').classList.add('show');
            });
          });

          // Bind delete events
          document.querySelectorAll('.btnDeleteProject').forEach(function(btn) {
            btn.addEventListener('click', async function(e) {
              var id = this.getAttribute('data-id');
              if(!confirm('Bạn có chắc chắn muốn xóa dự án này?')) return;
              var dres = await fetch('/api/projects/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
              });
              if(dres.ok) {
                showToast('Đã xóa dự án', 'success');
                loadProjects();
              } else {
                var err = await dres.json();
                showToast(err.message || 'Không thể xóa dự án', 'error');
              }
            });
          });
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="5" style="padding: 16px; text-align:center; color:var(--error)">Lỗi tải danh sách dự án.</td></tr>';
      }
    }

    // ── Load News ──
    async function loadNews() {
      var token = localStorage.getItem('vnidt_cms_token');
      var tbody = document.getElementById('newsTableBody');
      if(!tbody) return;
      tbody.innerHTML = '<tr><td colspan="6" style="padding: 16px; text-align:center;">Đang tải...</td></tr>';
      try {
        var res = await fetch('/api/news');
        var resData = await res.json();
        if (resData.success) {
          var html = '';
          resData.data.forEach(function(n) {
            var dateStr = new Date(n.publishedAt).toLocaleString('vi-VN');
            var localISO = new Date(n.publishedAt).toISOString().slice(0, 16);
            var statusBadge = n.status === 'published' 
              ? '<span class="field__badge" style="background:#D1FAE5; color:#065F46; padding: 2px 6px; border-radius: 4px; font-size:11px">Đã đăng</span>' 
              : '<span class="field__badge" style="background:#F3F4F6; color:#374151; padding: 2px 6px; border-radius: 4px; font-size:11px">Nháp</span>';
            var authorEmail = n.author?.email || 'Hệ thống';
            
            html += '<tr style="border-bottom: 1px solid var(--border);">' +
                    '<td style="padding: 12px 16px; color:var(--text-muted)">' + dateStr + '</td>' +
                    '<td style="padding: 12px 16px; font-weight:600">' + n.name + '</td>' +
                    '<td style="padding: 12px 16px; font-family:monospace; font-size:12px; color:var(--text-secondary)">' + n.slug + '</td>' +
                    '<td style="padding: 12px 16px;">' + statusBadge + '</td>' +
                    '<td style="padding: 12px 16px; color:var(--text-muted); font-size:13px">' + authorEmail + '</td>' +
                    '<td style="padding: 12px 16px;">' +
                    '<button class="btn btn--ghost btnEditNews" data-id="'+n.id+'" data-name="'+n.name+'" data-slug="'+n.slug+'" data-status="'+n.status+'" data-desc="'+n.description+'" data-date="'+localISO+'" style="padding: 6px; color:var(--accent); margin-right: 8px;" title="Sửa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
                    '<button class="btn btn--ghost btnDeleteNews" data-id="'+n.id+'" style="padding: 6px; color:var(--error);" title="Xóa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>' +
                    '</td></tr>';
          });
          tbody.innerHTML = html || '<tr><td colspan="6" style="padding: 16px; text-align:center; color:var(--text-muted)">Chưa có tin tức nào.</td></tr>';
          
          // Bind edit events
          document.querySelectorAll('.btnEditNews').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
              var id = this.getAttribute('data-id');
              var name = this.getAttribute('data-name');
              var slug = this.getAttribute('data-slug');
              var status = this.getAttribute('data-status');
              var desc = this.getAttribute('data-desc');
              var date = this.getAttribute('data-date');
              
              document.getElementById('newsModalTitle').innerText = 'Sửa Tin Tức';
              document.getElementById('newsModalId').value = id;
              document.getElementById('newsModalName').value = name;
              document.getElementById('newsModalSlug').value = slug;
              document.getElementById('newsModalStatus').value = status;
              document.getElementById('newsModalDesc').value = desc;
              document.getElementById('newsModalDate').value = date;
              document.getElementById('newsModal').classList.add('show');
            });
          });

          // Bind delete events
          document.querySelectorAll('.btnDeleteNews').forEach(function(btn) {
            btn.addEventListener('click', async function(e) {
              var id = this.getAttribute('data-id');
              if(!confirm('Bạn có chắc chắn muốn xóa tin tức này?')) return;
              var dres = await fetch('/api/news/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
              });
              if(dres.ok) {
                showToast('Đã xóa tin tức', 'success');
                loadNews();
              } else {
                var err = await dres.json();
                showToast(err.message || 'Không thể xóa tin tức', 'error');
              }
            });
          });
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="4" style="padding: 16px; text-align:center; color:var(--error)">Lỗi tải danh sách tin tức.</td></tr>';
      }
    }

    // ── Load Contacts ──
    async function loadContacts() {
      var token = localStorage.getItem('vnidt_cms_token');
      var tbody = document.getElementById('contactsTableBody');
      if(!tbody) return;
      tbody.innerHTML = '<tr><td colspan="6" style="padding: 16px; text-align:center;">Đang tải...</td></tr>';
      try {
        var res = await fetch('/api/contact', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        var resData = await res.json();
        if (resData.success) {
          var html = '';
          var sectorLabels = {
            gis: 'Cơ sở dữ liệu GIS',
            webgis: 'Nền tảng WebGIS',
            aquaculture: 'Quản lý thủy sản',
            environment: 'Quản lý nguồn thải / Môi trường',
            disaster: 'Cảnh báo thiên tai',
            digital: 'Tư vấn chuyển đổi số',
            other: 'Khác',
          };
          resData.data.forEach(function(c) {
            var dateStr = new Date(c.createdAt).toLocaleString('vi-VN');
            var sectorLabel = sectorLabels[c.sector] || c.sector || 'Chưa chọn';
            html += '<tr style="border-bottom: 1px solid var(--border);">' +
                    '<td style="padding: 12px 16px; font-weight:600">' + c.name + '</td>' +
                    '<td style="padding: 12px 16px;">' + c.email + (c.phone ? '<br><small style="color:var(--text-muted)">' + c.phone + '</small>' : '') + '</td>' +
                    '<td style="padding: 12px 16px; color:var(--text-secondary)">' + (c.organization || '<i style="color:var(--text-muted)">Không có</i>') + '</td>' +
                    '<td style="padding: 12px 16px;"><span class="field__badge field__badge--html">' + sectorLabel + '</span></td>' +
                    '<td style="padding: 12px 16px; max-width:250px; white-space:pre-wrap; font-size:12.5px">' + c.message + '</td>' +
                    '<td style="padding: 12px 16px;">' +
                    '<button class="btn btn--ghost btnDeleteContact" data-id="'+c.id+'" style="padding: 6px; color:var(--error);" title="Xóa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>' +
                    '</td></tr>';
          });
          tbody.innerHTML = html || '<tr><td colspan="6" style="padding: 16px; text-align:center; color:var(--text-muted)">Chưa có yêu cầu tư vấn nào.</td></tr>';

          // Bind delete events
          document.querySelectorAll('.btnDeleteContact').forEach(function(btn) {
            btn.addEventListener('click', async function(e) {
              var id = this.getAttribute('data-id');
              if(!confirm('Bạn có chắc chắn muốn xóa yêu cầu tư vấn này?')) return;
              var dres = await fetch('/api/contact/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
              });
              if(dres.ok) {
                showToast('Đã xóa yêu cầu tư vấn', 'success');
                loadContacts();
              } else {
                var err = await dres.json();
                showToast(err.message || 'Không thể xóa yêu cầu', 'error');
              }
            });
          });
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="6" style="padding: 16px; text-align:center; color:var(--error)">Lỗi tải danh sách yêu cầu tư vấn.</td></tr>';
      }
    }

    // ── Init bindings for dynamic sections ──
    function initDynamicBindings() {
      var projModal = document.getElementById('projModal');
      var projFileInput = document.getElementById('projModalFile');
      var projFileName = document.getElementById('projModalFileName');
      var projPreview = document.getElementById('projModalPreview');
      var projPreviewImg = document.getElementById('projModalPreviewImg');

      // File preview handler
      if (projFileInput) {
        projFileInput.addEventListener('change', function() {
          if (this.files && this.files[0]) {
            projFileName.textContent = this.files[0].name;
            var reader = new FileReader();
            reader.onload = function(e) {
              projPreviewImg.src = e.target.result;
              projPreview.style.display = 'block';
            };
            reader.readAsDataURL(this.files[0]);
          }
        });
      }

      function resetProjModal() {
        document.getElementById('projModalTitle').innerText = 'Thêm Dự Án';
        document.getElementById('projModalId').value = '';
        document.getElementById('projModalTag').value = '';
        document.getElementById('projModalName').value = '';
        document.getElementById('projModalDesc').value = '';
        document.getElementById('projModalImageUrl').value = '';
        if (projFileInput) projFileInput.value = '';
        if (projFileName) projFileName.textContent = 'Chưa chọn ảnh';
        if (projPreview) projPreview.style.display = 'none';
      }

      var btnCreateProject = document.getElementById('btnCreateProject');
      if (btnCreateProject) {
        btnCreateProject.addEventListener('click', function() {
          resetProjModal();
          projModal.classList.add('show');
        });
      }
      var projCancel = document.getElementById('projModalCancel');
      if (projCancel) {
        projCancel.addEventListener('click', function() {
          projModal.classList.remove('show');
        });
      }
      var projConfirm = document.getElementById('projModalConfirm');
      if (projConfirm) {
        projConfirm.addEventListener('click', async function() {
          var id = document.getElementById('projModalId').value;
          var tag = document.getElementById('projModalTag').value.trim();
          var name = document.getElementById('projModalName').value.trim();
          var desc = document.getElementById('projModalDesc').value.trim();
          var imageUrl = document.getElementById('projModalImageUrl').value.trim();
          
          if (!tag || !name || !desc) return showToast('Vui lòng nhập đủ thông tin', 'error');

          // Upload ảnh nếu có file mới được chọn
          if (projFileInput && projFileInput.files && projFileInput.files[0]) {
            var formData = new FormData();
            formData.append('file', projFileInput.files[0]);
            try {
              var uploadRes = await fetch('/api/upload/image', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('vnidt_cms_token') },
                body: formData
              });
              var uploadData = await uploadRes.json();
              if (uploadData.success) {
                imageUrl = uploadData.imageUrl;
              } else {
                return showToast(uploadData.message || 'Lỗi tải ảnh lên', 'error');
              }
            } catch(uploadErr) {
              return showToast('Lỗi kết nối khi tải ảnh lên', 'error');
            }
          }
          
          var payload = { tag: tag, name: name, description: desc, imageUrl: imageUrl || null };
          var url = '/api/projects' + (id ? '/' + id : '');
          var method = id ? 'PUT' : 'POST';
          
          var res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('vnidt_cms_token') },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            showToast(id ? 'Cập nhật dự án thành công' : 'Thêm dự án thành công', 'success');
            projModal.classList.remove('show');
            loadProjects();
          } else {
            var err = await res.json();
            showToast(err.message || 'Lỗi lưu dự án', 'error');
          }
        });
      }

      // Slugify helper function
      function slugify(text) {
        return text.toString().toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[đĐ]/g, 'd')
          .replace(/([^0-9a-z-\s])/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-+/, '')
          .replace(/-+$/, '');
      }

      var newsModal = document.getElementById('newsModal');
      var btnCreateNews = document.getElementById('btnCreateNews');
      if (btnCreateNews) {
        btnCreateNews.addEventListener('click', function() {
          document.getElementById('newsModalTitle').innerText = 'Thêm Tin Tức';
          document.getElementById('newsModalId').value = '';
          document.getElementById('newsModalName').value = '';
          document.getElementById('newsModalSlug').value = '';
          document.getElementById('newsModalStatus').value = 'draft';
          document.getElementById('newsModalDesc').value = '';
          document.getElementById('newsModalDate').value = new Date(Date.now() + 7*60*60*1000).toISOString().slice(0, 16);
          newsModal.classList.add('show');
        });
      }

      var newsNameInput = document.getElementById('newsModalName');
      if (newsNameInput) {
        newsNameInput.addEventListener('input', function() {
          var id = document.getElementById('newsModalId').value;
          if (!id) {
            document.getElementById('newsModalSlug').value = slugify(newsNameInput.value);
          }
        });
      }

      var newsCancel = document.getElementById('newsModalCancel');
      if (newsCancel) {
        newsCancel.addEventListener('click', function() {
          newsModal.classList.remove('show');
        });
      }
      var newsConfirm = document.getElementById('newsModalConfirm');
      if (newsConfirm) {
        newsConfirm.addEventListener('click', async function() {
          var id = document.getElementById('newsModalId').value;
          var name = document.getElementById('newsModalName').value.trim();
          var slug = document.getElementById('newsModalSlug').value.trim();
          var status = document.getElementById('newsModalStatus').value;
          var desc = document.getElementById('newsModalDesc').value.trim();
          var date = document.getElementById('newsModalDate').value;
          
          if (!name || !slug || !desc) return showToast('Vui lòng nhập đủ thông tin', 'error');
          
          var payload = { name: name, slug: slug, status: status, description: desc };
          if (date) {
            payload.publishedAt = new Date(date).toISOString();
          }
          
          var url = '/api/news' + (id ? '/' + id : '');
          var method = id ? 'PUT' : 'POST';
          
          var res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('vnidt_cms_token') },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            showToast(id ? 'Cập nhật tin tức thành công' : 'Thêm tin tức thành công', 'success');
            newsModal.classList.remove('show');
            loadNews();
          } else {
            var err = await res.json();
            showToast(err.message || 'Lỗi lưu tin tức', 'error');
          }
        });
      }
    }

    // ── Load Users (If Super Admin) ──
    async function loadUsers() {
      if (userStore.role !== 'super_admin') return;
      var token = localStorage.getItem('vnidt_cms_token');
      var tbody = document.getElementById('usersTableBody');
      if(!tbody) return;
      
      try {
        var res = await fetch('/api/users', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        var users = await res.json();
        var html = '';
        users.forEach(function(u) {
          html += '<tr style="border-bottom: 1px solid var(--border);">' +
                  '<td style="padding: 12px 16px;">' + u.email + '</td>' +
                  '<td style="padding: 12px 16px;"><span class="field__badge field__badge--html">' + u.role + '</span></td>' +
                  '<td style="padding: 12px 16px;">' +
                  '<button class="btn btn--ghost btnEditUser" data-id="'+u.id+'" data-email="'+u.email+'" data-role="'+u.role+'" style="padding: 6px; color:var(--accent); margin-right: 8px;" title="Sửa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
                  '<button class="btn btn--ghost btnDeleteUser" data-id="'+u.id+'" style="padding: 6px; color:var(--error);" title="Xóa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>' +
                  '</td></tr>';
        });
        tbody.innerHTML = html;

        // Bind edit events
        document.querySelectorAll('.btnEditUser').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            var id = this.getAttribute('data-id');
            var email = this.getAttribute('data-email');
            var role = this.getAttribute('data-role');
            
            document.getElementById('userModalTitle').innerText = 'Sửa Tài Khoản';
            document.getElementById('userModalId').value = id;
            document.getElementById('userModalEmail').value = email;
            document.getElementById('userModalPassword').value = '';
            document.getElementById('userModalRole').value = role;
            document.getElementById('userModalPasswordHint').style.display = 'inline';
            
            document.getElementById('userModal').classList.add('show');
          });
        });

        // Bind delete events
        document.querySelectorAll('.btnDeleteUser').forEach(function(btn) {
          btn.addEventListener('click', async function(e) {
            var id = this.getAttribute('data-id');
            if(!confirm('Bạn có chắc chắn muốn xóa tài khoản này?')) return;
            var dres = await fetch('/api/users/' + id, {
              method: 'DELETE',
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if(dres.ok) {
              showToast('Đã xóa tài khoản', 'success');
              loadUsers();
            } else {
              var err = await dres.json();
              showToast(err.message, 'error');
            }
          });
        });
      } catch(e) {}
    }

    if (userStore.role === 'super_admin') {
      loadUsers();
      
      var userModal = document.getElementById('userModal');
      
      document.getElementById('userModalCancel').addEventListener('click', function() {
        userModal.classList.remove('show');
      });
      
      document.getElementById('userModalConfirm').addEventListener('click', async function() {
        var id = document.getElementById('userModalId').value;
        var email = document.getElementById('userModalEmail').value;
        var password = document.getElementById('userModalPassword').value;
        var role = document.getElementById('userModalRole').value;
        
        if (!email) return showToast('Vui lòng nhập Email', 'error');
        if (!id && !password) return showToast('Vui lòng nhập Mật khẩu cho tài khoản mới', 'error');
        
        var payload = { email: email, role: role };
        if (password) payload.password = password;
        
        var url = '/api/users' + (id ? '/' + id : '');
        var method = id ? 'PUT' : 'POST';
        
        var res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('vnidt_cms_token') },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          showToast(id ? 'Cập nhật tài khoản thành công' : 'Tạo tài khoản thành công', 'success');
          userModal.classList.remove('show');
          loadUsers();
        } else {
          var err = await res.json();
          showToast(err.message, 'error');
        }
      });
      
      var btnCreateUser = document.getElementById('btnCreateUser');
      if (btnCreateUser) {
        btnCreateUser.addEventListener('click', function() {
          document.getElementById('userModalTitle').innerText = 'Thêm Tài Khoản';
          document.getElementById('userModalId').value = '';
          document.getElementById('userModalEmail').value = '';
          document.getElementById('userModalPassword').value = '';
          document.getElementById('userModalRole').value = 'editor';
          document.getElementById('userModalPasswordHint').style.display = 'none';
          
          userModal.classList.add('show');
        });
      }
    }

    // ── Change Password Modal ──
    var pwdModal = document.getElementById('pwdModal');
    var btnChangePwd = document.getElementById('btnChangePwd');
    if (btnChangePwd) {
      btnChangePwd.addEventListener('click', function() { pwdModal.classList.add('show'); });
    }
    document.getElementById('pwdCancel').addEventListener('click', function() { pwdModal.classList.remove('show'); });
    document.getElementById('pwdConfirm').addEventListener('click', async function() {
      var oldPassword = document.getElementById('pwdOld').value;
      var newPassword = document.getElementById('pwdNew').value;
      if (!oldPassword || !newPassword) return showToast('Vui lòng nhập đủ thông tin', 'error');

      var token = localStorage.getItem('vnidt_cms_token');
      var res = await fetch('/api/users/me/change-password', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ oldPassword: oldPassword, newPassword: newPassword })
      });
      if (res.ok) {
        showToast('Đổi mật khẩu thành công', 'success');
        pwdModal.classList.remove('show');
        document.getElementById('pwdOld').value = '';
        document.getElementById('pwdNew').value = '';
      } else {
        var err = await res.json();
        showToast(err.message, 'error');
      }
    });

    // ── Logout ──
    document.getElementById('btnLogout').addEventListener('click', function () {
      localStorage.removeItem('vnidt_cms_token');
      localStorage.removeItem('vnidt_cms_user');
      window.location.href = 'login.html';
    });

  })();
  </script>
