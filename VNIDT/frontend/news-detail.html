<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNiDT — Chi Tiết Tin Tức</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles_enterprise.css">
  <style>
    .detail-hero {
      padding: 120px 0 60px;
      background: linear-gradient(135deg, #F3F8FB 0%, #EBF3F7 100%);
      border-bottom: 1px solid rgba(13, 148, 136, 0.1);
    }
    .detail-body {
      padding: 60px 0 100px;
      background: #FFFFFF;
    }
    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--gutter);
    }
    .detail-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .detail-meta div {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-title {
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1.2;
      margin-bottom: 24px;
    }
    .detail-content {
      font-size: 17px;
      line-height: 1.8;
      color: var(--text-secondary);
    }
    .detail-content p {
      margin-bottom: 24px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-btn:hover {
      color: var(--color-primary);
    }
  </style>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <img src="assets/Logo_transparent.png" alt="VNiDT Logo" style="height: 47px; width: auto; object-fit: contain;">
      </a>
      <div class="navbar__links">
        <a href="index.html#home" class="navbar__link">Trang Chủ</a>
        <a href="index.html#about" class="navbar__link">Giới Thiệu</a>
        <a href="index.html#solutions" class="navbar__link">Giải Pháp</a>
        <a href="index.html#projects" class="navbar__link">Dự Án</a>
        <a href="index.html#news" class="navbar__link">Tin Tức</a>
        <a href="index.html#contact" class="navbar__link">Liên Hệ</a>
      </div>
      <a href="index.html#contact" class="btn btn--primary navbar__cta">
        Tư Vấn Miễn Phí
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>
  </nav>

  <!-- ===== DETAIL HERO ===== -->
  <header class="detail-hero">
    <div class="detail-container">
      <a href="index.html#news" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Quay lại Tin tức
      </a>
      <div class="detail-meta">
        <div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
          <span id="news-date">...</span>
        </div>
        <div style="width: 4px; height: 4px; border-radius: 50%; background: var(--text-subtle);"></div>
        <div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="news-author">Tác giả</span>
        </div>
      </div>
      <h1 id="news-title" class="detail-title">Đang tải thông tin bài viết...</h1>
    </div>
  </header>

  <!-- ===== DETAIL BODY ===== -->
  <article class="detail-body">
    <div class="detail-container">
      <div class="detail-content" id="news-desc">
        <!-- News description/content will render here -->
      </div>
      <!-- Attachment Section -->
      <div id="attachment-wrap" style="display:none; margin-top: 40px; padding: 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-accent); flex-shrink: 0;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          <div style="min-width: 0;">
            <div style="font-weight: 600; color: var(--text-primary); font-size: 15px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 100%;" id="attachment-name">Tai_lieu_dinh_kem.pdf</div>
            <div style="font-size: 12px; color: var(--text-muted);">Tài liệu đính kèm chính thức</div>
          </div>
        </div>
        <a href="" id="attachment-link" download class="btn btn--primary" style="padding: 8px 16px; font-size: 13px; text-decoration: none;">
          Tải về
        </a>
      </div>
    </div>
  </article>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p class="footer__copyright">© 2026 VNiDT. Bảo lưu mọi quyền.</p>
      </div>
    </div>
  </footer>

  <script src="config.js"></script>
  <script>
    (async function() {
      'use strict';
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        document.getElementById('news-title').textContent = 'Mã bài viết không hợp lệ.';
        return;
      }

      try {
        const response = await fetch('/api/news/' + slug);
        const res = await response.json();
        
        if (res.success && res.data) {
          const news = res.data;
          document.getElementById('news-title').textContent = news.name;
          document.getElementById('news-date').textContent = new Date(news.publishedAt).toLocaleDateString('vi-VN');
          document.getElementById('news-author').textContent = news.author ? news.author.email.split('@')[0] : 'Ban Biên Tập';
          
          // Render description paragraphs
          document.getElementById('news-desc').innerHTML = `<p>${news.description.replace(/\n/g, '</p><p>')}</p>`;
          
          if (news.attachmentUrl) {
            document.getElementById('attachment-name').textContent = news.attachmentName || news.attachmentUrl.split('/').pop();
            const link = document.getElementById('attachment-link');
            link.href = window.getAssetUrl ? window.getAssetUrl(news.attachmentUrl) : news.attachmentUrl;
            document.getElementById('attachment-wrap').style.display = 'flex';
          }
          document.title = news.name + ' — VNiDT';
        } else {
          document.getElementById('news-title').textContent = 'Không tìm thấy bài viết.';
        }
      } catch(err) {
        console.error(err);
        document.getElementById('news-title').textContent = 'Lỗi khi tải thông tin bài viết.';
      }
    })();
  </script>
</body>
</html>
