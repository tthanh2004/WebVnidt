<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNiDT — Chi Tiết Dự Án</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles_enterprise.css">
  <style>
    .detail-hero {
      padding: 120px 0 60px;
      background: linear-gradient(135deg, #F3F8FB 0%, #EBF3F7 100%);
      border-bottom: 1px solid rgba(13, 148, 136, 0.1);
    }
    .detail-body {
      padding: 60px 0 100px;
      background: #FFFFFF;
    }
    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--gutter);
    }
    .detail-tag {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(13, 148, 136, 0.1);
      color: var(--color-secondary);
      border-radius: var(--r-full);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-title {
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1.2;
      margin-bottom: 32px;
    }
    .detail-img-wrap {
      border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid rgba(15, 82, 186, 0.12);
      box-shadow: 0 20px 40px rgba(15, 82, 186, 0.08);
      margin-bottom: 40px;
      background: var(--bg-surface);
    }
    .detail-img {
      width: 100%;
      height: auto;
      max-height: 500px;
      object-fit: cover;
      display: block;
    }
    .detail-content {
      font-size: 17px;
      line-height: 1.8;
      color: var(--text-secondary);
    }
    .detail-content p {
      margin-bottom: 24px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-btn:hover {
      color: var(--color-primary);
    }
  </style>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <img src="assets/Logo_transparent.png" alt="VNiDT Logo" style="height: 47px; width: auto; object-fit: contain;">
      </a>
      <div class="navbar__links">
        <a href="index.html#home" class="navbar__link">Trang Chủ</a>
        <a href="index.html#about" class="navbar__link">Giới Thiệu</a>
        <a href="index.html#solutions" class="navbar__link">Giải Pháp</a>
        <a href="index.html#projects" class="navbar__link">Dự Án</a>
        <a href="index.html#news" class="navbar__link">Tin Tức</a>
        <a href="index.html#contact" class="navbar__link">Liên Hệ</a>
      </div>
      <a href="index.html#contact" class="btn btn--primary navbar__cta">
        Tư Vấn Miễn Phí
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>
  </nav>

  <!-- ===== DETAIL HERO ===== -->
  <header class="detail-hero">
    <div class="detail-container">
      <a href="index.html#projects" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Quay lại Dự án
      </a>
      <div id="proj-tag" class="detail-tag">...</div>
      <h1 id="proj-title" class="detail-title">Đang tải thông tin dự án...</h1>
    </div>
  </header>

  <!-- ===== DETAIL BODY ===== -->
  <article class="detail-body">
    <div class="detail-container">
      <div class="detail-img-wrap" id="proj-img-wrap" style="display:none;">
        <img id="proj-img" src="" alt="Hình ảnh dự án" class="detail-img">
      </div>
      <div class="detail-content" id="proj-desc">
        <!-- Project description will render here -->
      </div>
    </div>
  </article>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p class="footer__copyright">© 2026 VNiDT. Bảo lưu mọi quyền.</p>
      </div>
    </div>
  </footer>

  <script src="config.js"></script>
  <script>
    (async function() {
      'use strict';
      const params = new URLSearchParams(window.location.search);
      const projectId = params.get('id');

      if (!projectId) {
        document.getElementById('proj-title').textContent = 'Mã dự án không hợp lệ.';
        return;
      }

      try {
        const response = await fetch('/api/projects/' + projectId);
        const res = await response.json();
        
        if (res.success && res.data) {
          const project = res.data;
          document.getElementById('proj-title').textContent = project.name;
          document.getElementById('proj-tag').textContent = project.tag;
          document.getElementById('proj-desc').innerHTML = `<p>${project.description.replace(/\n/g, '</p><p>')}</p>`;
          
          if (project.imageUrl) {
            const imgWrap = document.getElementById('proj-img-wrap');
            const img = document.getElementById('proj-img');
            img.src = window.getAssetUrl ? window.getAssetUrl(project.imageUrl) : project.imageUrl;
            img.alt = project.name;
            imgWrap.style.display = 'block';
          }
          document.title = project.name + ' — VNiDT';
        } else {
          document.getElementById('proj-title').textContent = 'Không tìm thấy thông tin dự án.';
        }
      } catch(err) {
        console.error(err);
        document.getElementById('proj-title').textContent = 'Lỗi khi tải thông tin dự án.';
      }
    })();
  </script>
</body>
</html>
