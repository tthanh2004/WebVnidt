<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập CMS - VNiDT</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-app: #F4F7FA;
      --bg-card: #FFFFFF;
      --bg-input: #F1F5F9;
      --bg-input-focus: #FFFFFF;
      --border: #E2E8F0;
      --border-focus: #4390C8;
      --text-primary: #0C1E36;
      --text-secondary: #475569;
      --accent: #4390C8;
      --accent-glow: rgba(67, 144, 200, 0.15);
      --error: #EF4444;
      --radius: 16px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
      --brand-purple: #670E7A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Be Vietnam Pro', system-ui, sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(67, 144, 200, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(103, 14, 122, 0.08), transparent 25%);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(12, 30, 54, 0.06);
      position: relative;
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--brand-purple), var(--accent));
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand img {
      height: 54px;
      margin-bottom: 16px;
    }
    .brand h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .brand p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      transition: all var(--transition);
      outline: none;
    }
    .form-input:focus {
      border-color: var(--border-focus);
      background: var(--bg-input-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand-purple), var(--accent));
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .btn-login:hover {
      box-shadow: 0 8px 20px rgba(67, 144, 200, 0.25);
      transform: translateY(-1px);
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.15);
      color: var(--error);
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #FFFFFF;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand">
      <img src="assets/Logo_transparent.png" alt="VNiDT Logo">
      <h1>Hệ thống Quản trị</h1>
      <p>Đăng nhập để quản lý nội dung website</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Địa chỉ Email</label>
        <input type="email" id="email" class="form-input" placeholder="admin@vnidt.vn" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText">Đăng nhập ngay</span>
        <div class="loader" id="loader"></div>
      </button>
    </form>
  </div>

  <script src="config.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btnLogin = document.getElementById('btnLogin');
      const btnText = document.getElementById('btnText');
      const loader = document.getElementById('loader');

      // Reset states
      errorMsg.style.display = 'none';
      btnLogin.disabled = true;
      btnText.style.display = 'none';
      loader.style.display = 'block';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Đăng nhập thất bại');
        }

        // Save token to localStorage
        localStorage.setItem('vnidt_cms_token', data.access_token);
        localStorage.setItem('vnidt_cms_user', JSON.stringify(data.user));

        // Redirect to admin panel
        window.location.href = 'admin.html';
        
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        
        // Restore button state
        btnLogin.disabled = false;
        btnText.style.display = 'block';
        loader.style.display = 'none';
      }
    });

    // Auto redirect if already logged in
    if (localStorage.getItem('vnidt_cms_token')) {
      window.location.href = 'admin.html';
    }
  </script>

</body>
</html>
