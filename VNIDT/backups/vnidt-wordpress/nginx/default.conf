# VNiDT WordPress - Nginx Reverse Proxy Configuration

# Rate limiting zones (PHẢI nằm ngoài server block)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

upstream vnidt_wordpress {
    server vnidt-wordpress:80;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Max upload size (WordPress media uploads)
    client_max_body_size 64M;

    # Connection timeouts
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;

    # Static files - cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4)$ {
        proxy_pass http://vnidt_wordpress;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WordPress admin area - no caching
    location /wp-admin {
        proxy_pass http://vnidt_wordpress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }

    # WordPress login - rate limiting
    location = /wp-login.php {
        proxy_pass http://vnidt_wordpress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=login burst=5 nodelay;
    }

    # WordPress REST API
    location /wp-json/ {
        proxy_pass http://vnidt_wordpress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api burst=20 nodelay;
    }

    # Block access to sensitive files
    location ~ /\.(htaccess|htpasswd|env|git|svn) {
        deny all;
        return 404;
    }

    location ~ /wp-config\.php {
        deny all;
        return 404;
    }

    # Block xmlrpc.php (security)
    location = /xmlrpc.php {
        deny all;
        return 403;
    }

    # All other routes → WordPress
    location / {
        proxy_pass http://vnidt_wordpress;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
